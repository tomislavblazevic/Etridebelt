<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Theme color variants for light/dark (browsers that support prefers-color-scheme) -->
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff7fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1e1e1e" />
    <!-- Default theme color (fallback/system) -->
    <meta name="theme-color" content="#4f46e5" />
    <!-- Broad PWA/theme support across browsers -->
    <meta name="msapplication-TileColor" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.svg" />
    <title>Todo App</title>
    <style>
      /* Simple custom toggle switch */
      .theme-toggle-wrapper {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
      }
      .theme-checkbox {
        display: none;
      }
      .theme-label {
        background-color: #cbd5e1; /* Slate-300 */
        border-radius: 9999px;
        cursor: pointer;
        display: flex;
        height: 28px;
        position: relative;
        transition: background-color 0.3s ease;
        width: 52px;
      }
      .theme-ball {
        background-color: #ffffff;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        height: 24px;
        left: 2px;
        position: absolute;
        top: 2px;
        transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        width: 24px;
      }
      .theme-checkbox:checked + .theme-label {
        background-color: #4f46e5; /* Indigo-600 */
      }
      .theme-checkbox:checked + .theme-label .theme-ball {
        transform: translateX(24px);
      }
      .theme-checkbox:focus-visible + .theme-label {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }
      .theme-icon {
        height: 16px;
        position: absolute;
        top: 6px;
        width: 16px;
        z-index: 0;
        pointer-events: none;
      }
      .theme-icon-sun {
        fill: #ffffff;
        left: 6px;
      }
      .theme-icon-moon {
        fill: #475569;
        right: 6px;
      }
      .theme-ball {
        z-index: 1;
      }
      /* Global styles for dark mode */
      html.dark body {
        background-color: #1e1e1e; /* Dark Grey */
        color: #ffffff; /* White */
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Theme Toggle HTML & Script -->
    <div class="theme-toggle-wrapper">
      <input type="checkbox" id="theme-toggle" class="theme-checkbox" />
      <label for="theme-toggle" class="theme-label" aria-label="Toggle Dark Mode">
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.25a.75.75 0 01.75.75v2.25a.75.75 0 01-1.5 0V3a.75.75 0 01.75-.75zM7.5 12a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM18.894 6.166a.75.75 0 00-1.06-1.06l-1.591 1.59a.75.75 0 101.06 1.061l1.591-1.59zM21.75 12a.75.75 0 01-.75.75h-2.25a.75.75 0 010-1.5H21a.75.75 0 01.75.75zM17.834 18.894a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 10-1.061 1.06l1.59 1.591zM12 18a.75.75 0 01.75.75V21a.75.75 0 01-1.5 0v-2.25A.75.75 0 0112 18zM7.758 17.303a.75.75 0 00-1.061-1.06l-1.591 1.59a.75.75 0 001.06 1.061l1.591-1.59zM6 12a.75.75 0 01-.75.75H3a.75.75 0 010-1.5h2.25A.75.75 0 016 12zM6.697 7.757a.75.75 0 001.06-1.06l-1.59-1.591a.75.75 0 00-1.061 1.06l1.59 1.591z" /></svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9.528 1.718a.75.75 0 01.162.819A8.97 8.97 0 009 6a9 9 0 009 9 8.97 8.97 0 003.463-.69.75.75 0 01.981.98 10.503 10.503 0 01-9.694 6.46c-5.799 0-10.5-4.701-10.5-10.5 0-4.368 2.667-8.112 6.46-9.694a.75.75 0 01.818.162z" /></svg>
        <div class="theme-ball"></div>
      </label>
    </div>
    <script>
      (function() {
        var toggle = document.getElementById('theme-toggle');
        var html = document.documentElement;
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        function updateThemeColor(isDark) {
          var color = isDark ? '#1e1e1e' : '#fff7fb';
          // Update all theme-color meta tags to force the mobile browser toolbar change
          var metas = document.querySelectorAll('meta[name="theme-color"]');
          for (var i = 0; i < metas.length; i++) {
            metas[i].setAttribute('content', color);
          }
        }

        // Expose function for React to call when syncing with DB
        window.applyTheme = function(theme) {
          if (theme === 'dark') {
            html.classList.add('dark');
            toggle.checked = true;
            localStorage.setItem('theme', 'dark');
            updateThemeColor(true);
          } else {
            html.classList.remove('dark');
            toggle.checked = false;
            localStorage.setItem('theme', 'light');
            updateThemeColor(false);
          }
        };

        // Set initial state
        if (stored === 'dark' || (!stored && prefersDark)) {
          window.applyTheme('dark');
        }

        // Handle toggle changes
        toggle.addEventListener('change', function() {
          var newTheme = this.checked ? 'dark' : 'light';
          window.applyTheme(newTheme);
          // Dispatch event so React can save to database
          window.dispatchEvent(new CustomEvent('theme-change', { detail: newTheme }));
        });
      })();
    </script>
  </body>
</html>
