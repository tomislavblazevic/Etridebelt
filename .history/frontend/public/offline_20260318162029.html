<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;background:#f8fafc;color:#0f172a;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
      .card{background:white;padding:28px;border-radius:12px;box-shadow:0 8px 24px rgba(2,6,23,0.08);max-width:540px;text-align:center}
      h1{color:#4f46e5;margin:0 0 8px}
      p{color:#475569}
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>The app is not connected to the network. Some features may be unavailable, but you can still view and edit local todos.</p>
    </div>
  </body>
</html>
